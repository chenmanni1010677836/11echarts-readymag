<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECharts</title>
  <!-- 1. 引入ECharts CDN：无需本地下载，公网直接加载 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    /* 2. 关键样式：消除白边、占满容器 */
    * {margin:0;padding:0;box-sizing:border-box}
    html,body {width:100%;height:100%;overflow:hidden} /* overflow:hidden 防止滚动条 */
    #main {width:100%;height:100%} /* 图表容器占满页面 */
  </style>
</head>
<body>
<div id="main"></div> <!-- 3. 图表挂载容器 -->
<script>
// 4. 初始化ECharts实例
const chartDom = document.getElementById('main');
const myChart = echarts.init(chartDom);
// 5. 图表配置项（核心：替换成自己的图表逻辑）
const option = {
  backgroundColor: 'transparent', // 关键：适配Readymag背景透明
  xAxis: {type: 'category', data: ['周一','周二','周三','周四','周五','周六','周日']},
  yAxis: {type: 'value'},
  series: [{type: 'bar', data: [120,200,150,80,70,110,130]}]
};
myChart.setOption(option); // 渲染图表
// 6. 自适应：iframe缩放时图表自动调整大小
window.addEventListener('resize', ()=>myChart.resize())
</script>
</body>
</html>
